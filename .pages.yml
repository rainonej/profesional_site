media:
  - name: media
    label: Media
    input: site/public/media
    output: /media
    extensions:
      - png
      - jpg
      - jpeg
      - webp
      - svg
      - gif

content:
  - name: person
    label: Profile — Person
    type: file
    path: site/src/content/profile/person.json
    fields:
      - name: name
        label: Name
        type: string
        description: Displayed in the nav, hero, and page titles.
      - name: email
        label: Email
        type: string
        description: Shown on the About and Contact pages.
      - name: photo
        label: Photo
        type: image
        description: >
          Profile image on the About page and homepage hero. Upload to media;
          leave empty for initial-only placeholder.
        options:
          media: media
      - name: linkedin
        label: LinkedIn URL
        type: string
        description: Full URL, e.g. https://linkedin.com/in/yourname. Optional.
      - name: instagram
        label: Instagram URL
        type: string
        description: Full URL, e.g. https://instagram.com/yourhandle. Optional.
      - name: bio
        label: Bio
        type: text
        description: Your bio on the About page and homepage. You can use line breaks.

  - name: site
    label: Profile — Site Config
    type: file
    path: site/src/content/config/site.json
    fields:
      - name: tagline
        label: Tagline
        type: string
        description: Short line shown after your name on the homepage hero.
      - name: bookingUrl
        label: Booking URL
        type: string
        description: >
          Your full Calendly (or other booking) URL, e.g.
          https://calendly.com/yourname/30min. When set, the "Book a
          conversation" button on the homepage and the inline booking widget on
          the Contact page will use this link. Leave empty to hide the booking
          widget until you're ready.

  - name: navigation
    label: Navigation
    type: file
    path: site/src/content/config/navigation.json
    fields:
      - name: links
        label: Nav Links
        type: object
        list: true
        fields:
          - name: href
            label: Path
            type: string
            description: Page path, e.g. /about or /work.
          - name: label
            label: Label
            type: string
            description: Text shown in the nav bar.

  - name: features
    label: Focus Areas
    type: file
    path: site/src/content/config/features.json
    fields:
      - name: pillars
        label: Thematic Pillars
        type: object
        list: true
        fields:
          - name: heading
            label: Heading
            type: string
            required: true
            description: Short title for this area of focus.
          - name: body
            label: Description
            type: text
            description: One or two sentences describing this focus area.
          - name: image
            label: Image
            type: image
            description: Illustrative image for this pillar.
            options:
              media: media
      - name: ctaBody
        label: Collaboration CTA
        type: text
        description: Short text in the "Let's collaborate" call-to-action section at the bottom of the homepage.

  - name: contact
    label: Contact Page Copy
    type: file
    path: site/src/content/config/contact.json
    fields:
      - name: heading
        label: Heading
        type: string
        description: Main heading on the contact page, e.g. "Let's work together".
      - name: body
        label: Body
        type: text
        description: Short paragraph shown under the heading on the contact page.

  - name: cv
    label: CV — Awards & Education
    type: file
    path: site/src/content/profile/cv.json
    fields:
      - name: awards
        label: Awards & Honors
        type: object
        list: true
        fields:
          - name: title
            label: Award Title
            type: string
            required: true
            description: Name of the award, e.g. "Shirley Chisholm Trailblazer Award".
          - name: context
            label: Context / Event
            type: string
            description: The awarding program or event, e.g. "Provost's Student Excellence Awards 2023-24".
          - name: description
            label: Description
            type: text
            description: A paragraph describing the award and its significance.
          - name: image
            label: Award Photo
            type: image
            description: Photo from the award ceremony. Upload via the media library.
            options:
              media: media
      - name: education
        label: Education
        type: object
        list: true
        fields:
          - name: degree
            label: Degree
            type: string
            required: true
            description: Degree and field, e.g. "M.A. Curriculum and Teaching".
          - name: institution
            label: Institution
            type: string
            required: true
            description: University or college name.
          - name: location
            label: Location
            type: string
            description: City and country, e.g. "New York, NY".
          - name: year
            label: Graduation Year
            type: string
            description: Year of graduation, e.g. "2024". Leave empty if not applicable.
          - name: note
            label: Note
            type: text
            description: Thesis title, honors, or a brief description of your studies.

  - name: projects
    label: Work / Projects
    type: collection
    path: site/src/content/projects
    format: yaml-frontmatter
    view:
      primary: title
      fields: [description, image, tags, link, date, featured]
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true
        description: Project title shown in the work grid and on the project page.
      - name: description
        label: Description
        type: text
        description: Short description shown in the work grid. One or two sentences.
      - name: image
        label: Image
        type: image
        description: Cover image for the project. Upload via the media library; stored in site/public/media.
        options:
          media: media
      - name: tags
        label: Tags
        type: string
        list: true
        description: e.g. Design, Branding, Photography. Press Enter after each tag.
      - name: link
        label: External link
        type: string
        description: Optional URL if the project is published online.
      - name: date
        label: Date
        type: date
        required: true
        description: Used for ordering and display (e.g. "March 2025").
      - name: featured
        label: Show on homepage
        type: boolean
        description: When on, this project appears in the "Featured Work" section on the homepage.
      - name: body
        label: Details
        type: rich-text
        description: Full project details on the project page. Supports headings, lists, and links.

  - name: writing
    label: Writing
    type: collection
    path: site/src/content/writing
    format: yaml-frontmatter
    view:
      primary: title
      fields: [description, date, tags, draft]
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true
        description: Title of the post.
      - name: description
        label: Description
        type: text
        description: One-sentence summary shown in the writing index and homepage.
      - name: date
        label: Date
        type: date
        required: true
        description: Publish date used for ordering.
      - name: tags
        label: Tags
        type: string
        list: true
        description: e.g. Curriculum, Equity, Teaching. Press Enter after each tag.
      - name: draft
        label: Draft
        type: boolean
        description: When on, this post is hidden from the site until you turn it off.
      - name: body
        label: Post
        type: rich-text
        description: The full post content. Supports headings, lists, and links.

  - name: testimonials
    label: Testimonials
    type: collection
    path: site/src/content/testimonials
    format: json
    filename: "{fields.author}.json"
    view:
      primary: author
      fields: [role, featured]
    fields:
      - name: author
        label: Name
        type: string
        required: true
        description: Person's name.
      - name: role
        label: Role / Affiliation
        type: string
        description: e.g. "Program Director, Girls Inc. NYC". Optional.
      - name: quote
        label: Quote
        type: text
        required: true
        description: The testimonial text. Do not include quotation marks — they are added automatically.
      - name: featured
        label: Show on homepage
        type: boolean
        description: When on, this testimonial appears in the homepage testimonials section.
