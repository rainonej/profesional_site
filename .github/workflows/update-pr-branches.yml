# When dev advances, merge the latest dev into every open PR that targets dev (same as
# "Update branch" in the UI). Non-conflicting PRs stay current so strict branch protection
# and auto-merge can proceed; conflicting PRs are skipped until you resolve them.
# See issue #68.
#
# Uses WORKFLOW_TRIGGER_PAT (not GITHUB_TOKEN) for pulls.updateBranch because GitHub
# does not run new workflows for events caused by the default GITHUB_TOKEN. Without a
# PAT, heads move forward but CI never re-runs.
# Docs:
# https://docs.github.com/en/actions/security-for-github-actions/security-guides/
# automatic-token-authentication#using-the-github_token-in-a-workflow
#
# Secret: fine-grained PAT on this repo with Contents + Pull requests read/write
# (or classic PAT with `repo`). Settings → Secrets → Actions.
name: Auto-update PR branches

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: update-pr-branches-dev
  cancel-in-progress: true

jobs:
  update-branches:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Require WORKFLOW_TRIGGER_PAT
        run: |
          if [ -z "$WORKFLOW_TRIGGER_PAT" ]; then
            echo "::error::WORKFLOW_TRIGGER_PAT Actions secret is not set."
            echo "Add a fine-grained PAT: Contents + Pull requests (read/write) on this repo."
            echo "Required so CI re-runs after updating PR branches (GITHUB_TOKEN does not)."
            exit 1
          fi
        env:
          WORKFLOW_TRIGGER_PAT: ${{ secrets.WORKFLOW_TRIGGER_PAT }}

      - name: Update open PRs targeting dev
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WORKFLOW_TRIGGER_PAT }}
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: 'dev',
              state: 'open',
              sort: 'created',
              direction: 'asc',
            });

            console.log(`Open PRs into dev: ${pulls.length}`);

            for (const pr of pulls) {
              if (pr.head.repo?.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
                console.log(`Skipping fork PR #${pr.number}`);
                continue;
              }
              try {
                await github.rest.pulls.updateBranch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                });
                console.log(`✓ Merged dev into PR #${pr.number} (${pr.head.ref})`);
              } catch (err) {
                const status = err.status ?? err.response?.status;
                const body = String(err.response?.data?.message ?? err.message ?? '');
                if (status === 422) {
                  if (/conflict|Could not merge/i.test(body)) {
                    console.log(
                      `✗ PR #${pr.number}: merge conflict with dev — resolve locally or on GitHub, ` +
                        `then push; this PR was not auto-updated.`,
                    );
                  } else {
                    console.log(`— PR #${pr.number}: no update needed (${body})`);
                  }
                } else {
                  console.log(`✗ PR #${pr.number}: ${body || err.message}`);
                }
              }
            }
