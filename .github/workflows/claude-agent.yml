name: Claude Code Agent

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  claude-simple:
    if: |
      (github.event_name == 'issues' &&
       github.event.label.name == 'claude-ready' &&
       contains(join(github.event.issue.labels.*.name, ','), 'simple-ai')) ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Run Claude Code Action (simple)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          max_turns: "5"

  claude-agentic:
    if: |
      github.event_name == 'issues' &&
      github.event.label.name == 'claude-ready' &&
      contains(join(github.event.issue.labels.*.name, ','), 'agentic-ai')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Run Claude Code Action (agentic)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          max_turns: "20"
