# Triggers: one run per PR (on pull_request), one run on merge (push to main).
# Push to non-main branches does not run CI. See #43, #48.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint YAML (Pages CMS, workflows, Decap config)
        run: |
          pip install yamllint
          yamllint .pages.yml site/public/admin/config.yml .github/workflows/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies (site)
        working-directory: site
        run: npm ci

      - name: Lint (ESLint, stylelint, Prettier)
        working-directory: site
        run: npm run lint

  astro-check:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: site

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Install Rollup Linux native binary (lockfile from Windows omits it; npm/cli#4828)
      - name: Fix Rollup optional dependency
        run: npm install @rollup/rollup-linux-x64-gnu --no-save

      - name: Astro check
        run: npm run check

  build:
    runs-on: ubuntu-latest
    needs: [lint, astro-check]
    defaults:
      run:
        working-directory: site

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Install Rollup Linux native binary (lockfile from Windows omits it; npm/cli#4828)
      - name: Fix Rollup optional dependency
        run: npm install @rollup/rollup-linux-x64-gnu --no-save

      - name: Build
        run: npm run build

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
