# Triggers: checks run on push to dev/main and PRs into dev, main, or any epic/* branch.
# Deploy runs on push to main only. Push to dev catches direct commits (e.g. from Pages CMS).
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev, "epic/**"]
  workflow_dispatch:

# Job order: lint → astro-check & build (both need lint) → deploy (main only)
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint YAML (Pages CMS config, workflows)
        run: |
          pip install yamllint
          yamllint .pages.yml .github/workflows/

      - name: Setup site
        uses: ./.github/actions/setup-site
        with:
          with_rollup: false

      - name: Lint (ESLint, stylelint, Prettier)
        working-directory: site
        run: npm run lint

      - name: Lint Markdown
        run: ./site/node_modules/.bin/markdownlint-cli2

  astro-check:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup site
        uses: ./.github/actions/setup-site
        with:
          with_rollup: true

      - name: Astro check
        working-directory: site
        run: npm run check

  build:
    runs-on: ubuntu-latest
    needs: [lint, astro-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup site
        uses: ./.github/actions/setup-site
        with:
          with_rollup: true

      - name: Build
        working-directory: site
        run: npm run build

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          # GITHUB_ACTIONS build: @astrojs/vercel puts prerendered HTML in dist/client (not dist/).
          path: site/dist/client

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
